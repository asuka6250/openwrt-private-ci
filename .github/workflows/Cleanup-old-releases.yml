name: Cleanup Old Bot Releases

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: '🔍 仅预览（不执行实际删除）'
        required: false
        type: boolean
        default: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo: ['local', 'private']
    
    steps:
      - name: Set Repository Info
        id: info
        run: |
          if [ "${{ matrix.repo }}" = "local" ]; then
            echo "target_repo=${{ github.repository }}" >> $GITHUB_OUTPUT
            echo "target_token=${{ secrets.GITHUB_TOKEN }}" >> $GITHUB_OUTPUT
          else
            echo "target_repo=sora-shao/openwrt-private" >> $GITHUB_OUTPUT
            echo "target_token=${{ secrets.MY_PRIVATE_REPO_TOKEN }}" >> $GITHUB_OUTPUT
          fi

      - name: Cleanup Releases and Tags
        env:
          GH_TOKEN: ${{ steps.info.outputs.target_token }}
          REPO: ${{ steps.info.outputs.target_repo }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          echo "========================================================="
          echo "📂 正在检查仓库: $REPO"
          echo "========================================================="

          # 获取所有 Release 的 JSON 数据
          # 筛选条件：由你的构建脚本生成的特定格式 (包含日期戳 e.g. 2026-04-01-1600)
          # 正则匹配示例：...-202X-XX-XX-XXXX
          RELEASES=$(gh api repos/$REPO/releases --paginate --jq '.[] | select(.tag_name | test(".*-[0-9]{4}-[0-9]{2}-[0-9]{2}-[0-9]{4}$")) | {tag_name: .tag_name, id: .id, created_at: .created_at}')
          
          COUNT=$(echo "$RELEASES" | jq -s 'length')
          echo "🤖 发现由 Bot 发布的 Release 总数: $COUNT"

          if [ "$COUNT" -le 10 ]; then
            echo "✅ 当前 Bot Release 数量未超过 10 个，无需清理。"
          else
            # 按创建时间排序，保留最新的 10 个，取出需要删除的（最早的）
            TO_DELETE=$(echo "$RELEASES" | jq -s -c 'sort_by(.created_at) | reverse | .[10:] | .[]')
            DELETE_COUNT=$(echo "$TO_DELETE" | jq -s 'length')
            
            echo "⚠️ 需要删除的旧 Release 数量: $DELETE_COUNT"
            echo "--------------------------------------------------------"

            echo "$TO_DELETE" | jq -c '.' | while read -r row; do
              TAG=$(echo "$row" | jq -r '.tag_name')
              ID=$(echo "$row" | jq -r '.id')
              
              if [ "$DRY_RUN" = "true" ]; then
                echo "[预览] 准备删除 Release: $TAG (ID: $ID)"
              else
                echo "🚀 正在执行删除: $TAG"
                # 删除 Release
                gh api -X DELETE repos/$REPO/releases/$ID
                # 删除对应的 Tag
                gh api -X DELETE repos/$REPO/git/refs/tags/$TAG || echo "⚠️ Tag $TAG 可能已被手动移除"
              fi
            done
            echo "--------------------------------------------------------"
            echo "✨ 清理完成！"
          fi
