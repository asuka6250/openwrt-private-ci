name: Cleanup Old Bot Releases

on:
  release:
    types: [published] # 每次发布新 Release 时自动触发
  workflow_dispatch:
    inputs:
      dry_run:
        description: '🔍 仅预览（输出列表但不执行删除）'
        required: false
        type: boolean
        default: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # 分别处理本地仓库和你的私人仓库
        repo_type: ['local', 'private']
    
    steps:
      - name: Set Repository Context
        id: info
        run: |
          if [ "${{ matrix.repo_type }}" = "local" ]; then
            echo "target_repo=${{ github.repository }}" >> $GITHUB_OUTPUT
            echo "target_token=${{ secrets.GITHUB_TOKEN }}" >> $GITHUB_OUTPUT
          else
            echo "target_repo=sora-shao/openwrt-private" >> $GITHUB_OUTPUT
            echo "target_token=${{ secrets.MY_PRIVATE_REPO_TOKEN }}" >> $GITHUB_OUTPUT
          fi

      - name: List and Cleanup
        env:
          GH_TOKEN: ${{ steps.info.outputs.target_token }}
          REPO: ${{ steps.info.outputs.target_repo }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          echo "========================================================="
          echo "📂 正在检查仓库: $REPO"
          echo "========================================================="

          # 1. 获取所有符合 Bot 命名规则的 Release (正则匹配 YYYY-MM-DD-HHMM 结尾)
          # 使用 jq 提取名称和时间，并按时间【从早到后】排序
          ALL_BOT_RELEASES=$(gh api repos/$REPO/releases --paginate \
            --jq '.[] | select(.tag_name | test(".*-[0-9]{4}-[0-9]{2}-[0-9]{2}-[0-9]{4}$")) | {name: .name, tag: .tag_name, id: .id, time: .created_at}' \
            | jq -s 'sort_by(.time)')

          COUNT=$(echo "$ALL_BOT_RELEASES" | jq 'length')

          echo "🤖 当前 Bot 发布的 Release 列表 (从早到后):"
          echo "--------------------------------------------------------"
          if [ "$COUNT" -eq 0 ]; then
            echo "(无匹配的 Bot Release)"
          else
            # 循环输出：[时间] 名字
            echo "$ALL_BOT_RELEASES" | jq -r '.[] | "[\(.time)] \(.name)"'
          fi
          echo "--------------------------------------------------------"
          echo "统计: 共计 $COUNT 个 Bot Release"

          # 2. 判断是否需要删除
          if [ "$COUNT" -le 10 ]; then
            echo "✅ 数量未超过 10 个，无需清理。"
          else
            # 计算需要删除的数量 (总数 - 保留的10个)
            DELETE_LIMIT=$((COUNT - 10))
            echo "⚠️ 触发清理：保留最新的 10 个，准备删除最早的 $DELETE_LIMIT 个..."
            
            # 提取需要删除的对象（即排序后的前 DELETE_LIMIT 个）
            TO_DELETE=$(echo "$ALL_BOT_RELEASES" | jq -c ".[0:$DELETE_LIMIT] | .[]")

            echo "$TO_DELETE" | while read -r row; do
              TAG=$(echo "$row" | jq -r '.tag')
              NAME=$(echo "$row" | jq -r '.name')
              ID=$(echo "$row" | jq -r '.id')
              
              if [ "$DRY_RUN" = "true" ]; then
                echo " [预览模式] 跳过删除: $NAME"
              else
                echo " 🚀 正在执行删除: $NAME (Tag: $TAG)"
                # 删除 Release 实体
                gh api -X DELETE "repos/$REPO/releases/$ID" --silent
                # 删除对应的 Git Tag 引用
                gh api -X DELETE "repos/$REPO/git/refs/tags/$TAG" --silent || echo "  (Tag 已不存在)"
              fi
            done
            echo "--------------------------------------------------------"
            echo "✨ 仓库 $REPO 清理任务执行完毕。"
          fi
